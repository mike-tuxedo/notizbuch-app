<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notizbuch Relay Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
      font-size: 13px;
    }
    h1 { color: #58a6ff; font-size: 18px; margin-bottom: 16px; }
    h2 { color: #8b949e; font-size: 14px; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }

    .status-bar {
      display: flex; gap: 24px;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
    .stat-label { font-size: 11px; color: #8b949e; }

    .rooms { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .room-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      min-width: 250px;
      flex: 1;
    }
    .room-key { color: #f0883e; font-weight: bold; }
    .room-meta { color: #8b949e; font-size: 11px; margin-top: 4px; }

    .client-list { margin-top: 8px; }
    .client {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0;
      border-top: 1px solid #21262d;
    }
    .client-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
    .client-name { color: #c9d1d9; }
    .client-id { color: #484f58; font-size: 11px; }

    .log {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .log-entry {
      display: flex; gap: 12px;
      padding: 6px 12px;
      border-bottom: 1px solid #21262d;
      font-size: 12px;
    }
    .log-entry:hover { background: #1c2128; }
    .log-ts { color: #484f58; white-space: nowrap; min-width: 65px; }
    .log-peer { color: #d2a8ff; min-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-type { min-width: 80px; font-weight: bold; }
    .log-type.join { color: #3fb950; }
    .log-type.leave, .log-type.disconnect { color: #f85149; }
    .log-type.put { color: #58a6ff; }
    .log-type.delete { color: #f0883e; }
    .log-detail { color: #8b949e; }

    .conn-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 12px;
    }
    .conn-status.connected { background: #0d4429; color: #3fb950; }
    .conn-status.disconnected { background: #3d1418; color: #f85149; }
  </style>
</head>
<body>
  <h1>Notizbuch Relay Debug
    <span id="connStatus" class="conn-status disconnected">Verbinde...</span>
  </h1>

  <div class="status-bar">
    <div class="stat">
      <div class="stat-value" id="totalPeers">0</div>
      <div class="stat-label">Clients online</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalRooms">0</div>
      <div class="stat-label">Rooms</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalEvents">0</div>
      <div class="stat-label">Events</div>
    </div>
  </div>

  <h2>Rooms &amp; Clients</h2>
  <div class="rooms" id="rooms"></div>

  <h2>Event Log</h2>
  <div class="log" id="log"></div>

  <script>
    const logEl = document.getElementById('log');
    const roomsEl = document.getElementById('rooms');
    let eventCount = 0;

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderStatus(status) {
      document.getElementById('totalPeers').textContent = status.totalPeers;
      document.getElementById('totalRooms').textContent = status.rooms.length;

      roomsEl.innerHTML = '';
      if (status.rooms.length === 0) {
        roomsEl.innerHTML = '<div style="color:#484f58">Keine aktiven Rooms</div>';
        return;
      }
      for (const room of status.rooms) {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.innerHTML = `
          <div class="room-key">${room.room}</div>
          <div class="room-meta">${room.notebooks} Notebooks, ${room.clients.length} Clients</div>
          <div class="client-list">
            ${room.clients.map(c => `
              <div class="client">
                <div class="client-dot"></div>
                <span class="client-name">${esc(c.name)}</span>
                <span class="client-id">${c.id}</span>
              </div>
            `).join('')}
          </div>
        `;
        roomsEl.appendChild(card);
      }
    }

    function addLogEntry(event) {
      eventCount++;
      document.getElementById('totalEvents').textContent = eventCount;
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `
        <span class="log-ts">${formatTime(event.ts)}</span>
        <span class="log-peer">${esc(event.peerName)}</span>
        <span class="log-type ${event.type}">${event.type}</span>
        <span class="log-detail">${esc(event.detail)}</span>
      `;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // WebSocket zum Dashboard-Endpoint
    function connect() {
      const ws = new WebSocket(`wss://${location.host}?dashboard=1`);
      const statusEl = document.getElementById('connStatus');

      ws.onopen = () => {
        statusEl.textContent = 'Verbunden';
        statusEl.className = 'conn-status connected';
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'init') {
          renderStatus(msg.status);
          eventCount = msg.log.length;
          document.getElementById('totalEvents').textContent = eventCount;
          for (const ev of msg.log) addLogEntry(ev);
        } else if (msg.type === 'status') {
          renderStatus(msg.status);
        } else if (msg.type === 'event') {
          addLogEntry(msg.event);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Getrennt';
        statusEl.className = 'conn-status disconnected';
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
