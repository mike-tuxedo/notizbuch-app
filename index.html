<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2d3436">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notizbuch">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/favicon.ico">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="img/apple-touch-icon-144x144.png">
  <title>Notizbuch App</title>
  <script src="libs/petite-vue.iife.js"></script>
  <script src="libs/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
      touch-action: none;
    }
    
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    
    .tool-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .tool-btn.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    
    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
      margin: 0 6px;
    }
    
    /* Colors */
    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .color-btn.active {
      width: 26px;
      height: 26px;
      border: 3px solid rgba(255,255,255,0.9);
    }
    
    .color-btn.white {
      border-color: rgba(0,0,0,0.2);
    }
    
    .color-picker {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
      padding: 0;
      overflow: hidden;
    }
    
    .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }
    
    /* Size buttons */
    .size-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .size-btn.active {
      background: rgba(255,255,255,0.2);
    }
    
    .size-dot {
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }
    
    .size-btn.active .size-dot {
      background: white;
    }
    
    /* Secondary bar */
    .secondary-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .bg-btn {
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: white;
      font-size: 11px;
      cursor: pointer;
    }
    
    .bg-btn.active {
      background: rgba(255,255,255,0.2);
    }
    
    /* Toggle */
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    
    .toggle-track {
      width: 38px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      position: relative;
      transition: all 0.2s ease;
    }
    
    .toggle-track.active {
      background: #4dabf7;
    }
    
    .toggle-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: all 0.2s ease;
    }
    
    .toggle-track.active .toggle-thumb {
      left: 20px;
    }
    
    .toggle-label {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 500;
    }
    
    .toggle-track.active + .toggle-label {
      color: rgba(255,255,255,0.9);
    }
    
    /* Page nav */
    .page-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .page-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }
    
    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .page-btn.primary {
      background: rgba(77, 171, 247, 0.3);
    }
    
    .page-info {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      min-width: 80px;
      text-align: center;
    }
    
    /* Canvas container */
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      perspective: 2000px;
      background: #d0d0d0;
    }
    
    .canvas-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform-origin: left center;
    }
    
    /* Vorblättern: Aktuelle Seite klappt weg */
    .canvas-wrapper.flip-out-next {
      animation: flipOutNext 0.4s ease-in forwards;
    }
    
    /* Zurückblättern: Vorherige Seite klappt rein */
    .canvas-wrapper.flip-in-prev {
      animation: flipInPrev 0.4s ease-out forwards;
    }
    
    @keyframes flipOutNext {
      0% { 
        transform: rotateY(0deg); 
        box-shadow: 0 0 0 rgba(0,0,0,0);
      }
      100% { 
        transform: rotateY(-100deg); 
        box-shadow: 20px 0 40px rgba(0,0,0,0.5);
      }
    }
    
    @keyframes flipInPrev {
      0% { 
        transform: rotateY(-100deg); 
        box-shadow: 20px 0 40px rgba(0,0,0,0.5);
      }
      100% { 
        transform: rotateY(0deg); 
        box-shadow: 0 0 0 rgba(0,0,0,0);
      }
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }
    
    #activeCanvas {
      cursor: crosshair;
      touch-action: none;
    }
    
    #activeCanvas.eraser {
      cursor: cell;
    }
    
    /* Notebook menu */
    .notebook-selector {
      position: relative;
    }
    
    .notebook-btn {
      padding: 8px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .notebook-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: rgba(40,40,40,0.98);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 220px;
      z-index: 100;
      overflow: hidden;
    }
    
    .notebook-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      cursor: pointer;
      color: white;
      font-size: 13px;
    }
    
    .notebook-item:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .notebook-item.active {
      background: rgba(255,255,255,0.1);
    }
    
    .notebook-item-delete {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      padding: 2px;
    }
    
    .notebook-menu-footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 8px;
    }
    
    .new-notebook-btn {
      width: 100%;
      padding: 8px;
      background: rgba(77, 171, 247, 0.2);
      border: none;
      border-radius: 6px;
      color: #4dabf7;
      font-size: 12px;
      cursor: pointer;
    }
    
    .rename-input {
      padding: 6px 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: white;
      font-size: 12px;
      width: 120px;
    }
    
    .rename-ok {
      padding: 6px 10px;
      background: #4dabf7;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }
    
    .edit-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 4px;
    }
    
    .save-status {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      padding: 4px 8px;
    }
    
    .save-status.saving {
      color: #ffd43b;
    }
    
    .save-status.saved {
      color: #69db7c;
    }

    /* P2P Sync-Indikator (kleines drehendes Icon in der Toolbar) */
    .peer-sync-icon {
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.2);
      transition: color 0.4s;
    }
    .peer-sync-icon.active {
      color: #4dabf7;
    }
    .peer-sync-icon.active svg {
      animation: spin 0.9s linear infinite;
    }

    /* Sync overlay (waiting for P2P data) */
    .sync-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,15,25,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 900;
      backdrop-filter: blur(6px);
    }

    .sync-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
    }

    .sync-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #4dabf7;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Share Modal */
    .share-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .share-modal {
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 24px 24px;
      width: 360px;
      max-width: 92vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .share-modal h2 {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .share-modal p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .share-url-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .share-url-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.9);
      padding: 8px 12px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      min-width: 0;
    }

    .share-copy-btn {
      background: #4dabf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .share-copy-btn:hover { background: #339af0; }
    .share-copy-btn.copied { background: #69db7c; color: #1a1a2e; }

    .share-qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 14px;
    }

    .share-close-btn {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    .share-close-btn:hover { background: rgba(255,255,255,0.14); }

    /* Zen Mode */
    .app.zen-mode .secondary-bar { display: none; }
    .app.zen-mode .toolbar {
      padding: 6px 12px;
      background: rgba(0,0,0,0.15);
      border-bottom: none;
    }
    .app.zen-mode .notebook-selector,
    .app.zen-mode .edit-btn,
    .app.zen-mode .save-status,
    .app.zen-mode .peer-sync-icon,
    .app.zen-mode .divider:not(.zen-keep) {
      display: none;
    }
    .app.zen-mode .canvas-container {
      border-radius: 0;
    }

    /* Pinch-Zoom Wrapper */
    .canvas-zoom-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      transform-style: preserve-3d;
    }

    /* Zoom-Reset Button (erscheint nur wenn gezoomt) */
    .zoom-reset-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .zoom-reset-btn:hover { background: rgba(0,0,0,0.75); }
  </style>
</head>
<body>
  <div id="app" class="app" @vue:mounted="init()">
    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Notebook selector -->
      <div class="toolbar-group">
        <div class="notebook-selector">
          <button class="notebook-btn" @click="showNotebookMenu = !showNotebookMenu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            {{ currentNotebook?.name || 'Notizbuch' }}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
          
          <div class="notebook-menu" v-if="showNotebookMenu">
            <div v-for="nb in notebooks" :key="nb.id" 
                 class="notebook-item" 
                 :class="{ active: nb.id === currentNotebookId }"
                 @click="selectNotebook(nb.id)">
              <span>{{ nb.name }}</span>
              <button v-if="notebooks.length > 1" class="notebook-item-delete" @click.stop="deleteNotebook(nb.id)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div class="notebook-menu-footer">
              <button class="new-notebook-btn" @click="createNotebook()">+ Neues Notizbuch</button>
            </div>
          </div>
        </div>
        
        <!-- Rename -->
        <template v-if="editingName">
          <input class="rename-input" v-model="newName" @keydown.enter="renameNotebook()" autofocus>
          <button class="rename-ok" @click="renameNotebook()">OK</button>
        </template>
        <button v-else class="edit-btn" @click="startRename()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        
        <!-- Save status -->
        <span class="save-status" :class="saveStatus">{{ saveStatusText }}</span>

        <!-- P2P Sync-Indikator -->
        <span class="peer-sync-icon" :class="{ active: syncing || peerSync }" title="P2P-Sync">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </span>

        <!-- Share button -->
        <button class="tool-btn" @click="openShare()" title="Teilen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>

      <!-- Zen + Fullscreen (rechts, getrennte Gruppe) -->
      <div class="toolbar-group" style="margin-left: auto;">
        <button class="tool-btn" :class="{ active: isFullscreen }" @click="toggleFullscreen()"
                :title="isFullscreen ? 'Vollbild beenden' : 'Vollbild'">
          <svg v-if="!isFullscreen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
          <svg v-else width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
          </svg>
        </button>
        <button class="tool-btn" :class="{ active: zenMode }" @click="toggleZenMode()" title="Zen-Modus (ruhige Ansicht)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12a4 4 0 0 0 8 0"/>
            <line x1="12" y1="8" x2="12" y2="8.01"/>
          </svg>
        </button>
      </div>

      <!-- Tools -->
      <div class="toolbar-group">
        <button class="tool-btn" :class="{ active: tool === 'pen' }" @click="tool = 'pen'" title="Stift">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          </svg>
        </button>
        <button class="tool-btn" :class="{ active: tool === 'eraser' }" @click="tool = 'eraser'" title="Radierer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16c-.6-.6-.6-1.5 0-2.1l10-10c.6-.6 1.5-.6 2.1 0l6 6c.6.6.6 1.5 0 2.1L13 20"/>
          </svg>
        </button>
        <div class="divider"></div>
        <button class="tool-btn" @click="clearPage()" title="Seite löschen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
        </button>
      </div>

      <!-- Colors -->
      <div class="toolbar-group">
        <button v-for="c in colors" :key="c" 
                class="color-btn" 
                :class="{ active: color === c, white: c === '#ffffff' }"
                :style="{ background: c }"
                @click="color = c">
        </button>
        <input type="color" class="color-picker" v-model="color" title="Eigene Farbe">
      </div>

      <!-- Pen sizes -->
      <div class="toolbar-group">
        <button v-for="(ps, idx) in penSizes" :key="ps.name"
                class="size-btn" :class="{ active: penSizeIndex === idx }"
                @click="penSizeIndex = idx">
          <div class="size-dot" :style="{ width: Math.min(ps.size * 1.5, 16) + 'px', height: Math.min(ps.size * 1.5, 16) + 'px' }"></div>
        </button>
      </div>
    </div>

    <!-- Secondary bar -->
    <div class="secondary-bar">
      <!-- Background -->
      <div class="toolbar-group">
        <span style="color: rgba(255,255,255,0.5); font-size: 11px;">Hintergrund:</span>
        <button v-for="bg in backgrounds" :key="bg.id"
                class="bg-btn" :class="{ active: currentBackground === bg.id }"
                @click="setBackground(bg.id)">
          {{ bg.name }}
        </button>
      </div>

      <!-- Palm Rejection Toggle -->
      <label class="toggle" @click="palmRejection = !palmRejection; scheduleSave()">
        <div class="toggle-track" :class="{ active: palmRejection }">
          <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-label">Handerkennung</span>
      </label>

      <!-- Page navigation -->
      <div class="page-nav">
        <button class="page-btn" :disabled="!canGoPrev || isFlipping" @click="prevPage()">← Zurück</button>
        <span class="page-info">Seite {{ currentPageIndex + 1 }} / {{ totalPages }}</span>
        <button class="page-btn primary" :disabled="isFlipping" @click="nextPage()">Weiter →</button>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" ref="container">
      <div class="canvas-zoom-wrapper" :style="{ transform: `translate(${viewX}px,${viewY}px) scale(${viewScale})` }">
        <div class="canvas-wrapper" :class="flipClass">
          <canvas id="bgCanvas" ref="bgCanvas"></canvas>
          <canvas id="staticCanvas" ref="staticCanvas"></canvas>
          <canvas id="activeCanvas" ref="activeCanvas"
                  :class="{ eraser: tool === 'eraser' }"
                  @pointerdown="startDrawing"
                  @pointermove="draw"
                  @pointerup="stopDrawing"
                  @pointerleave="stopDrawing"
                  @pointercancel="stopDrawing">
          </canvas>
        </div>
      </div>
      <button v-if="viewScale !== 1 || viewX !== 0 || viewY !== 0" class="zoom-reset-btn"
              @click="viewScale = 1; viewX = 0; viewY = 0">
        {{ Math.round(viewScale * 100) }}% ✕
      </button>
    </div>

    <!-- Sync overlay: shown while waiting for P2P data on a shared URL -->
    <div class="sync-overlay" v-if="syncing">
      <div class="sync-box">
        <div class="sync-spinner"></div>
        <span>Synchronisiere…</span>
      </div>
    </div>

    <!-- Share Modal -->
    <div class="share-overlay" v-if="showShareModal" @click.self="closeShare()">
      <div class="share-modal">
        <h2>Link teilen</h2>
        <p>Wer diesen Link öffnet, kann in Echtzeit mitzeichnen. Kein Login nötig.</p>
        <div class="share-url-row">
          <input class="share-url-input" :value="shareUrl" readonly @click="$event.target.select()">
          <button class="share-copy-btn" :class="{ copied: copySuccess }" @click="copyShareUrl()">
            {{ copySuccess ? 'Kopiert ✓' : 'Kopieren' }}
          </button>
        </div>
        <div class="share-qr-wrap">
          <div id="share-qr-container"></div>
        </div>
        <button class="share-close-btn" @click="closeShare()">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = PetiteVue;

    // GenosDB instance (initialized in init())
    let db;
    let localDB;
    let dbInitialized = false;
    let roomKey = '';

    // Pinch-Zoom-State (außerhalb PetiteVue für high-frequency updates)
    const pinchState = {
      touches: {}, active: false,
      startViewX: 0, startViewY: 0, startScale: 1,
      startMidX: 0, startMidY: 0, startDist: 1
    };

    // IndexedDB für gerätespezifische Settings (nach roomKey isoliert)
    function openLocalDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('notes-app', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('settings');
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = () => reject(req.error);
      });
    }
    function idbGet(key) {
      return new Promise(resolve => {
        localDB.transaction('settings', 'readonly')
          .objectStore('settings').get(key).onsuccess = e => resolve(e.target.result ?? null);
      });
    }
    function idbPut(key, value) {
      return new Promise(resolve => {
        localDB.transaction('settings', 'readwrite')
          .objectStore('settings').put(value, key).onsuccess = () => resolve();
      });
    }

    // Stroke smoothing
    function smoothPoints(points) {
      if (points.length < 3) return points;
      const result = [];
      const numSegments = 4;
      
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[Math.max(0, i - 1)];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[Math.min(points.length - 1, i + 2)];
        
        for (let t = 0; t < numSegments; t++) {
          const s = t / numSegments;
          const s2 = s * s;
          const s3 = s2 * s;
          
          result.push({
            x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * s + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * s2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * s3),
            y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * s + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * s2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * s3)
          });
        }
      }
      result.push(points[points.length - 1]);
      return result;
    }

    // Build stroke polygon
    function buildStrokePolygon(points, width) {
      if (points.length < 2) return null;
      
      const leftEdge = [];
      const rightEdge = [];
      const halfWidth = width / 2;
      
      for (let i = 0; i < points.length; i++) {
        const curr = points[i];
        
        let dx, dy;
        if (i === 0) {
          dx = points[1].x - curr.x;
          dy = points[1].y - curr.y;
        } else if (i === points.length - 1) {
          dx = curr.x - points[i - 1].x;
          dy = curr.y - points[i - 1].y;
        } else {
          dx = points[i + 1].x - points[i - 1].x;
          dy = points[i + 1].y - points[i - 1].y;
        }
        
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        
        leftEdge.push({ x: curr.x + nx * halfWidth, y: curr.y + ny * halfWidth });
        rightEdge.push({ x: curr.x - nx * halfWidth, y: curr.y - ny * halfWidth });
      }
      
      return [...leftEdge, ...rightEdge.reverse()];
    }

    // Draw stroke to canvas
    function drawStrokeToCanvas(ctx, stroke) {
      if (!stroke.points || stroke.points.length < 2) return;
      
      const pts = stroke.points.length >= 3 ? smoothPoints(stroke.points) : stroke.points;
      const size = stroke.tool === 'eraser' ? stroke.size * 3 : stroke.size;
      
      ctx.globalCompositeOperation = stroke.tool === 'eraser' ? 'destination-out' : 'source-over';
      ctx.fillStyle = stroke.tool === 'eraser' ? 'rgba(0,0,0,1)' : stroke.color;
      
      // Draw circles at every point for smooth joins
      for (let i = 0; i < pts.length; i++) {
        ctx.beginPath();
        ctx.arc(pts[i].x, pts[i].y, size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Draw polygon
      const polygon = buildStrokePolygon(pts, size);
      if (polygon && polygon.length >= 3) {
        ctx.beginPath();
        ctx.moveTo(polygon[0].x, polygon[0].y);
        for (let i = 1; i < polygon.length; i++) {
          ctx.lineTo(polygon[i].x, polygon[i].y);
        }
        ctx.closePath();
        ctx.fill();
      }
    }

    createApp({
      // State
      notebooks: [],
      currentNotebookId: null,
      showNotebookMenu: false,
      editingName: false,
      newName: '',
      
      tool: 'pen',
      color: '#363636',
      penSizeIndex: 2,
      palmRejection: true,
      palmThreshold: 25, // Kontaktfläche > 25px = Handballen/Finger ignorieren
      
      colors: ['#363636', '#ffffff', '#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c', '#38d9a9', '#4dabf7', '#748ffc', '#da77f2'],
      penSizes: [
        { name: 'XS', size: 1 },
        { name: 'S', size: 2 },
        { name: 'M', size: 4 },
        { name: 'L', size: 8 },
        { name: 'XL', size: 16 }
      ],
      backgrounds: [
        { id: 'grid', name: 'Kariert' },
        { id: 'lined', name: 'Liniert' },
        { id: 'blank', name: 'Blank' }
      ],
      
      flipClass: '',
      isFlipping: false,
      isDrawing: false,
      currentPoints: [],
      lastPoint: null,
      strokeId: 0,
      activePointerId: null,
      activePointerType: null,
      
      saveStatus: '',
      saveStatusText: '',
      saveTimeout: null,

      showShareModal: false,
      shareUrl: '',
      copySuccess: false,
      syncing: false,
      peerSync: false,
      _peerSyncTimer: null,
      zenMode: false,
      isFullscreen: false,
      viewScale: 1,
      viewX: 0,
      viewY: 0,

      // Computed-like getters
      get currentNotebook() {
        return this.notebooks.find(n => n.id === this.currentNotebookId);
      },
      
      get currentPage() {
        return this.currentNotebook?.pages[this.currentNotebook.currentPage];
      },
      
      get strokes() {
        return this.currentPage?.strokes || [];
      },
      
      get currentBackground() {
        return this.currentPage?.background || 'grid';
      },
      
      get currentPageIndex() {
        return this.currentNotebook?.currentPage || 0;
      },
      
      get totalPages() {
        return this.currentNotebook?.pages.length || 1;
      },
      
      get canGoPrev() {
        return this.currentNotebook && this.currentNotebook.currentPage > 0;
      },
      
      // Methods
      async init() {
        // IndexedDB für gerätespezifische Settings öffnen
        localDB = await openLocalDB();

        // Room-Key aus URL-Hash lesen oder neu generieren.
        // isSharedUrl = true  → Hash war schon in der URL (geteilter Link)
        // isSharedUrl = false → wir haben den Hash gerade erzeugt (neue Session)
        roomKey = window.location.hash.slice(1);
        const isSharedUrl = !!roomKey;
        if (!roomKey) {
          roomKey = Array.from(crypto.getRandomValues(new Uint8Array(16)))
            .map(b => b.toString(16).padStart(2, '0')).join('');
          window.location.hash = roomKey;
        }

        // Gerätespezifische Settings aus IndexedDB laden (raumspezifisch geprefixxt)
        const savedCurrentId    = await idbGet(roomKey + ':currentNotebookId');
        const savedPalmRejection = await idbGet(roomKey + ':palmRejection');
        if (typeof savedPalmRejection === 'boolean') this.palmRejection = savedPalmRejection;

        // GenosDB laden und initialisieren (nur für Notizbuch-Inhalte, kein Settings-Sync)
        const { gdb } = await import('./libs/genosdb.js');
        db = await gdb(roomKey, { rtc: true });

        // Gesammelte Notebooks während der Init-Phase
        const notebooksMap = {};
        const self = this;

        // Debounce-Resolver: feuert 400ms nach dem letzten P2P-Event
        let p2pSettled = false;
        let p2pResolve = null;
        let p2pDebounceTimer = null;
        function triggerP2PDone() {
          p2pSettled = true;
          if (p2pResolve) p2pResolve();
        }

        const { unsubscribe } = db.map(function({ id, value, action }) {
          // 'settings' komplett ignorieren – wird nicht mehr via P2P geteilt
          if (id === 'settings') return;

          if (!dbInitialized) {
            // Init-Phase: lokale OPFS-Daten (initial) UND P2P-Daten (added/updated) sammeln
            if (action === 'initial' || action === 'added' || action === 'updated') {
              notebooksMap[id] = value;
            }
            // Nach P2P-Events: Debounce-Timer zurücksetzen
            if (action === 'added' || action === 'updated') {
              clearTimeout(p2pDebounceTimer);
              p2pDebounceTimer = setTimeout(triggerP2PDone, 400);
            }
          } else {
            // Nach der Init-Phase: reaktiv auf P2P-Updates reagieren
            if (action === 'added' || action === 'updated') {
              const idx = self.notebooks.findIndex(nb => String(nb.id) === String(id));
              if (idx >= 0) {
                // Lokale Seitenposition erhalten – wird nicht via P2P synchronisiert
                const localPage = self.notebooks[idx].currentPage ?? 0;
                const merged = JSON.parse(JSON.stringify(value));
                merged.currentPage = localPage;
                self.notebooks[idx] = merged;
              } else {
                const nb = JSON.parse(JSON.stringify(value));
                nb.currentPage = 0;
                self.notebooks.push(nb);
              }
              if (String(id) === String(self.currentNotebookId)) {
                self.drawBackground();
                self.redrawStrokes();
              }
              // Sync-Indikator kurz aufleuchten lassen
              self.peerSync = true;
              clearTimeout(self._peerSyncTimer);
              self._peerSyncTimer = setTimeout(() => { self.peerSync = false; }, 1500);
            } else if (action === 'removed') {
              self.notebooks = self.notebooks.filter(nb => String(nb.id) !== String(id));
              if (String(id) === String(self.currentNotebookId) && self.notebooks.length > 0) {
                self.currentNotebookId = self.notebooks[0].id;
                self.drawBackground();
                self.redrawStrokes();
              }
            }
          }
        });

        // Phase 1: Auf lokale OPFS-Daten warten (schnell, <150ms)
        await new Promise(resolve => setTimeout(resolve, 150));

        // Phase 2: Bei geteilter URL ohne lokale Daten → auf P2P-Sync warten
        if (isSharedUrl && Object.keys(notebooksMap).length === 0) {
          this.syncing = true;
          await Promise.race([
            new Promise(resolve => {
              p2pResolve = resolve;
              if (p2pSettled) resolve(); // bereits aufgelöst bevor wir hier ankamen
            }),
            new Promise(resolve => setTimeout(resolve, 8000)) // max 8s warten
          ]);
          this.syncing = false;
        }

        // Notizbücher laden
        const existingNotebooks = Object.values(notebooksMap);

        if (existingNotebooks.length > 0) {
          this.notebooks = existingNotebooks.sort((a, b) => String(a.id) < String(b.id) ? -1 : 1);
          // Gerätespezifische Settings wiederherstellen
          const validId = this.notebooks.find(nb => nb.id === savedCurrentId);
          this.currentNotebookId = validId ? savedCurrentId : this.notebooks[0].id;
          // Seitenpositionen aus IndexedDB wiederherstellen (nicht via P2P synchronisiert)
          const pagePositions = await idbGet(roomKey + ':pagePositions') || {};
          for (const nb of this.notebooks) {
            nb.currentPage = pagePositions[String(nb.id)] ?? (nb.currentPage ?? 0);
          }
          console.log('Daten aus GenosDB geladen');
        } else {
          // Wirklich neue Session (oder P2P-Timeout) → Standard anlegen
          this.createDefaultNotebook();
          await this._saveAll();
        }

        dbInitialized = true;

        this.setupCanvases();
        window.addEventListener('resize', () => this.setupCanvases());

        document.addEventListener('click', (e) => {
          if (!e.target.closest('.notebook-selector')) {
            this.showNotebookMenu = false;
          }
        });

        // Fullscreen-Zustand mit Browser synchronisieren (z.B. ESC-Taste)
        document.addEventListener('fullscreenchange', () => {
          this.isFullscreen = !!document.fullscreenElement;
          if (!document.fullscreenElement && this.zenMode) {
            this.zenMode = false;
            setTimeout(() => this.setupCanvases(), 100);
          }
        });

        // Tab-Fokus: Canvases neu zeichnen wenn Tab aktiv wird
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) {
            this.drawBackground();
            this.redrawStrokes();
          }
        });
      },

      toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      },

      toggleZenMode() {
        this.zenMode = !this.zenMode;
        if (this.zenMode) {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
          }
        } else {
          if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
          }
        }
        setTimeout(() => this.setupCanvases(), 100);
      },

      // Nur gerätespezifische Einstellungen (Navigation) in IndexedDB speichern – kein P2P-Sync
      async _saveLocalSettings() {
        if (!localDB) return;
        await idbPut(roomKey + ':currentNotebookId', this.currentNotebookId);
        await idbPut(roomKey + ':palmRejection', this.palmRejection);
        const positions = {};
        for (const nb of this.notebooks) {
          positions[String(nb.id)] = nb.currentPage ?? 0;
        }
        await idbPut(roomKey + ':pagePositions', positions);
      },

      // Notizbuch-Inhalte via GenosDB (P2P-Sync) + lokale Settings in IndexedDB speichern
      async _saveAll() {
        if (!db) return;
        for (const notebook of this.notebooks) {
          // JSON round-trip: reaktive Proxy-Objekte zu Plain Objects konvertieren
          // currentPage wird NICHT synchronisiert – nur lokal in IndexedDB gespeichert
          const copy = JSON.parse(JSON.stringify(notebook));
          delete copy.currentPage;
          await db.put(copy, String(notebook.id));
        }
        await this._saveLocalSettings();
      },
      
      createDefaultNotebook() {
        this.notebooks = [{
          id: String(Date.now()),
          name: 'Mein Notizbuch',
          pages: [{ id: 1, strokes: [], background: 'grid' }],
          currentPage: 0
        }];
        this.currentNotebookId = this.notebooks[0].id;
      },
      
      setupCanvases() {
        const container = this.$refs.container;
        if (!container) return;
        
        const rect = container.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        
        ['bgCanvas', 'staticCanvas', 'activeCanvas'].forEach(name => {
          const canvas = this.$refs[name];
          if (canvas) {
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            canvas.getContext('2d').scale(dpr, dpr);
          }
        });
        
        this.drawBackground();
        this.redrawStrokes();
      },
      
      drawBackground() {
        const canvas = this.$refs.bgCanvas;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.width / dpr;
        const h = canvas.height / dpr;
        const bg = this.currentBackground;
        
        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0, 0, w, h);
        
        if (bg === 'grid') {
          const gridSize = 20;
          ctx.strokeStyle = '#c5d8f0';
          ctx.lineWidth = 0.5;
          
          for (let x = gridSize; x < w; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
          }
          for (let y = gridSize; y < h; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
          }
          
          ctx.strokeStyle = '#a3c2e8';
          ctx.lineWidth = 1;
          for (let x = gridSize * 5; x < w; x += gridSize * 5) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
          }
          for (let y = gridSize * 5; y < h; y += gridSize * 5) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
          }
        } else if (bg === 'lined') {
          const lineHeight = 28;
          const marginTop = 60;
          ctx.strokeStyle = '#c5d8f0';
          ctx.lineWidth = 1;
          
          for (let y = marginTop; y < h; y += lineHeight) {
            ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke();
          }
          
          ctx.strokeStyle = '#ffaaaa';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(60, 0); ctx.lineTo(60, h); ctx.stroke();
        }
      },
      
      redrawStrokes() {
        const canvas = this.$refs.staticCanvas;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        
        this.strokes.forEach(stroke => drawStrokeToCanvas(ctx, stroke));
      },
      
      setBackground(bg) {
        if (!this.currentNotebook) return;
        this.currentNotebook.pages[this.currentNotebook.currentPage].background = bg;
        this.drawBackground();
        this.scheduleSave();
      },
      
      // Page navigation
      nextPage() {
        if (!this.currentNotebook || this.isFlipping) return;

        this.isFlipping = true;
        this.flipClass = 'flip-out-next';

        const isNewPage = (this.currentNotebook.currentPage + 1) >= this.currentNotebook.pages.length;

        setTimeout(() => {
          const nextIndex = this.currentNotebook.currentPage + 1;
          if (nextIndex >= this.currentNotebook.pages.length) {
            this.currentNotebook.pages.push({
              id: Date.now(),
              strokes: [],
              background: this.currentBackground
            });
          }
          this.currentNotebook.currentPage = nextIndex;
          this.drawBackground();
          this.redrawStrokes();

          this.flipClass = '';
          this.isFlipping = false;
          // Neue Seite → Peers informieren; nur Navigation → lokal speichern
          if (isNewPage) {
            this.scheduleSave();
          } else {
            this._saveLocalSettings();
          }
        }, 400);
      },
      
      prevPage() {
        if (!this.canGoPrev || this.isFlipping) return;
        
        this.isFlipping = true;
        
        // Wechsle sofort zur vorherigen Seite
        this.currentNotebook.currentPage--;
        this.drawBackground();
        this.redrawStrokes();
        
        // Animiere die Seite herein
        this.flipClass = 'flip-in-prev';
        
        setTimeout(() => {
          this.flipClass = '';
          this.isFlipping = false;
          this._saveLocalSettings(); // nur Navigation → nicht an Peers senden
        }, 400);
      },

      // Notebook management
      selectNotebook(id) {
        this.currentNotebookId = id;
        this.showNotebookMenu = false;
        setTimeout(() => {
          this.drawBackground();
          this.redrawStrokes();
        }, 0);
        this._saveLocalSettings(); // nur Navigation → nicht an Peers senden
      },
      
      createNotebook() {
        const newNb = {
          id: String(Date.now()),
          name: 'Neues Notizbuch',
          pages: [{ id: 1, strokes: [], background: 'grid' }],
          currentPage: 0
        };
        this.notebooks.push(newNb);
        this.currentNotebookId = newNb.id;
        this.showNotebookMenu = false;
        setTimeout(() => {
          this.drawBackground();
          this.redrawStrokes();
        }, 0);
        this.scheduleSave();
      },

      deleteNotebook(id) {
        if (this.notebooks.length <= 1) return;
        if (db) db.remove(String(id));
        this.notebooks = this.notebooks.filter(nb => nb.id !== id);
        if (this.currentNotebookId === id) {
          this.currentNotebookId = this.notebooks[0].id;
          setTimeout(() => {
            this.drawBackground();
            this.redrawStrokes();
          }, 0);
        }
        this.scheduleSave();
      },
      
      openShare() {
        this.shareUrl = window.location.href;
        this.copySuccess = false;
        this.showShareModal = true;
        setTimeout(() => {
          const container = document.getElementById('share-qr-container');
          if (container) {
            container.innerHTML = '';
            new QRCode(container, { text: this.shareUrl, width: 200, height: 200 });
          }
        }, 50);
      },

      closeShare() {
        this.showShareModal = false;
      },

      async copyShareUrl() {
        await navigator.clipboard.writeText(this.shareUrl);
        this.copySuccess = true;
        setTimeout(() => { this.copySuccess = false; }, 2500);
      },

      startRename() {
        this.newName = this.currentNotebook?.name || '';
        this.editingName = true;
      },
      
      renameNotebook() {
        if (!this.newName.trim() || !this.currentNotebook) return;
        this.currentNotebook.name = this.newName.trim();
        this.editingName = false;
        this.scheduleSave();
      },
      
      clearPage() {
        if (!this.currentPage) return;
        this.currentPage.strokes = [];
        this.redrawStrokes();
        this.scheduleSave();
      },
      
      // Auto-save via GenosDB
      scheduleSave() {
        if (this.saveTimeout) {
          clearTimeout(this.saveTimeout);
        }

        this.saveStatus = 'saving';
        this.saveStatusText = 'Speichern...';

        this.saveTimeout = setTimeout(async () => {
          try {
            await this._saveAll();
            this.saveStatus = 'saved';
            this.saveStatusText = 'Gespeichert ✓';

            setTimeout(() => {
              this.saveStatus = '';
              this.saveStatusText = '';
            }, 2000);
          } catch (e) {
            console.error('Speichern fehlgeschlagen:', e);
            this.saveStatus = '';
            this.saveStatusText = 'Fehler!';
          }
        }, 500);
      },
      
      // Drawing with Palm Rejection
      getPos(e) {
        const canvas = this.$refs.activeCanvas;
        const rect = canvas.getBoundingClientRect();
        // getBoundingClientRect berücksichtigt CSS-Transform des Elternelements,
        // daher durch viewScale teilen um Canvas-Koordinaten zu erhalten
        return {
          x: (e.clientX - rect.left) / this.viewScale,
          y: (e.clientY - rect.top) / this.viewScale
        };
      },
      
      isPalmOrFinger(e) {
        if (!this.palmRejection) return false;
        
        // Pen/Stylus wird immer akzeptiert
        if (e.pointerType === 'pen') return false;
        
        // Mouse wird akzeptiert
        if (e.pointerType === 'mouse') return false;
        
        // Touch: Prüfe Kontaktfläche
        if (e.pointerType === 'touch') {
          const contactWidth = e.width || 0;
          const contactHeight = e.height || 0;
          const contactSize = Math.max(contactWidth, contactHeight);
          
          // Debug: Zeige Touch-Größe in Konsole
          // console.log('Touch size:', contactSize, 'px');
          
          // Große Kontaktfläche = Handballen oder Finger
          if (contactSize > this.palmThreshold) {
            return true;
          }
          
          // Wenn bereits mit Pen gezeichnet wird, ignoriere Touch
          if (this.isDrawing && this.activePointerType === 'pen') {
            return true;
          }
        }
        
        return false;
      },
      
      startDrawing(e) {
        e.preventDefault();

        // Pinch-Zoom: Touch-Pointer tracken (vor Palm-Rejection-Check)
        if (e.pointerType === 'touch') {
          pinchState.touches[e.pointerId] = { x: e.clientX, y: e.clientY };
          const touchIds = Object.keys(pinchState.touches);
          if (touchIds.length >= 2) {
            const t1 = pinchState.touches[touchIds[0]];
            const t2 = pinchState.touches[touchIds[1]];
            pinchState.active = true;
            pinchState.startScale = this.viewScale;
            pinchState.startViewX = this.viewX;
            pinchState.startViewY = this.viewY;
            pinchState.startMidX = (t1.x + t2.x) / 2;
            pinchState.startMidY = (t1.y + t2.y) / 2;
            pinchState.startDist = Math.hypot(t2.x - t1.x, t2.y - t1.y) || 1;
            // Aktives Zeichnen abbrechen
            if (this.isDrawing) {
              this.isDrawing = false;
              this.activePointerId = null;
              this.activePointerType = null;
              this.currentPoints = [];
              const ac = this.$refs.activeCanvas;
              if (ac) {
                const ctx = ac.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                ctx.clearRect(0, 0, ac.width / dpr, ac.height / dpr);
              }
            }
            return;
          }
        }

        // Palm Rejection
        if (this.isPalmOrFinger(e)) {
          return;
        }

        // Wenn bereits gezeichnet wird, ignoriere neue Pointer
        if (this.isDrawing) return;
        
        const pos = this.getPos(e);
        
        this.isDrawing = true;
        this.activePointerId = e.pointerId;
        this.activePointerType = e.pointerType;
        this.lastPoint = pos;
        this.currentPoints = [{ x: pos.x, y: pos.y }];
        
        // Für Radierer: direkt auf staticCanvas zeichnen
        if (this.tool === 'eraser') {
          this.drawEraserPoint(pos);
        }
      },
      
      draw(e) {
        e.preventDefault();

        // Pinch-Zoom: laufend aktualisieren
        if (e.pointerType === 'touch' && e.pointerId in pinchState.touches) {
          pinchState.touches[e.pointerId] = { x: e.clientX, y: e.clientY };
          if (pinchState.active) {
            const touchIds = Object.keys(pinchState.touches);
            if (touchIds.length >= 2) {
              const t1 = pinchState.touches[touchIds[0]];
              const t2 = pinchState.touches[touchIds[1]];
              const curDist = Math.hypot(t2.x - t1.x, t2.y - t1.y) || 1;
              const curMidX = (t1.x + t2.x) / 2;
              const curMidY = (t1.y + t2.y) / 2;
              const newScale = Math.min(8, Math.max(0.2, pinchState.startScale * curDist / pinchState.startDist));

              // Canvaspunkt unter Start-Mittelpunkt fixiert halten
              const cr = this.$refs.container.getBoundingClientRect();
              const midX0 = pinchState.startMidX - cr.left;
              const midY0 = pinchState.startMidY - cr.top;
              const canvasX = (midX0 - pinchState.startViewX) / pinchState.startScale;
              const canvasY = (midY0 - pinchState.startViewY) / pinchState.startScale;
              const panDX = curMidX - pinchState.startMidX;
              const panDY = curMidY - pinchState.startMidY;

              this.viewX = midX0 - canvasX * newScale + panDX;
              this.viewY = midY0 - canvasY * newScale + panDY;
              this.viewScale = newScale;
            }
            return;
          }
        }

        if (!this.isDrawing) return;

        // Nur akzeptieren wenn es der gleiche Pointer ist
        if (e.pointerId !== this.activePointerId) return;
        
        const pos = this.getPos(e);
        this.currentPoints.push({ x: pos.x, y: pos.y });
        this.lastPoint = pos;
        
        if (this.tool === 'eraser') {
          // Radierer: direkt auf staticCanvas
          this.drawEraserSegment();
        } else {
          // Stift: auf activeCanvas (Preview)
          this.drawActiveStroke();
        }
      },
      
      drawEraserPoint(pos) {
        const canvas = this.$refs.staticCanvas;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const size = this.penSizes[this.penSizeIndex].size * 3;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, size / 2, 0, Math.PI * 2);
        ctx.fill();
      },
      
      drawEraserSegment() {
        const canvas = this.$refs.staticCanvas;
        if (!canvas || this.currentPoints.length < 2) return;
        
        const ctx = canvas.getContext('2d');
        const size = this.penSizes[this.penSizeIndex].size * 3;
        const pts = this.currentPoints;
        const from = pts[pts.length - 2];
        const to = pts[pts.length - 1];
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,1)';
        
        // Kreis am neuen Punkt
        ctx.beginPath();
        ctx.arc(to.x, to.y, size / 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Linie zwischen den Punkten
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'rgba(0,0,0,1)';
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
      },
      
      drawActiveStroke() {
        const canvas = this.$refs.activeCanvas;
        if (!canvas || this.currentPoints.length < 2) return;
        
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        
        const tempStroke = {
          points: this.currentPoints,
          color: this.color,
          size: this.penSizes[this.penSizeIndex].size,
          tool: this.tool
        };
        
        drawStrokeToCanvas(ctx, tempStroke);
      },
      
      stopDrawing(e) {
        // Pinch-Zoom: Pointer aus Tracking entfernen
        if (e && e.pointerType === 'touch') {
          delete pinchState.touches[e.pointerId];
          if (Object.keys(pinchState.touches).length < 2) {
            pinchState.active = false;
          }
          if (pinchState.active) return; // noch zwei Finger aktiv
        }

        if (!this.isDrawing) return;

        // Nur stoppen wenn es der aktive Pointer ist
        if (e && e.pointerId !== this.activePointerId) return;
        
        this.isDrawing = false;
        this.activePointerId = null;
        this.activePointerType = null;
        
        if (this.currentPoints.length > 0 && this.currentPage) {
          if (this.tool === 'eraser') {
            // Radierer: Stroke als Eraser-Stroke speichern
            const newStroke = {
              id: Date.now(),
              points: [...this.currentPoints],
              color: '#000000',
              size: this.penSizes[this.penSizeIndex].size,
              tool: 'eraser'
            };
            this.currentPage.strokes.push(newStroke);
          } else {
            // Stift: normaler Stroke
            const newStroke = {
              id: Date.now(),
              points: [...this.currentPoints],
              color: this.color,
              size: this.penSizes[this.penSizeIndex].size,
              tool: 'pen'
            };
            this.currentPage.strokes.push(newStroke);
            this.redrawStrokes();
          }
          
          this.scheduleSave();
        }
        
        // Clear active canvas
        const canvas = this.$refs.activeCanvas;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          const dpr = window.devicePixelRatio || 1;
          ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        }
        
        this.currentPoints = [];
        this.lastPoint = null;
      }
    }).mount('#app');
  </script>

  <script>
    // Service Worker registrieren (PWA / Offline-Support)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registriert:', reg.scope))
          .catch(err => console.warn('[SW] Registrierung fehlgeschlagen:', err));
      });
    }
  </script>
