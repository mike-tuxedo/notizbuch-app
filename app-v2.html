<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0e0d15">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notizbuch">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/favicon.ico">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <title>Notizbuch App</title>
  <script src="libs/iro.min.js"></script>
  <script src="libs/qrcode.min.js"></script>
  <style>
    /* ─── Variables ──────────────────────────────────────────────────────── */
    :root {
      --bg:          #0e0d15;
      --surface:     #171622;
      --surface-2:   #1f1d30;
      --border:      #2b2840;
      --border-2:    #3a3658;
      --accent:      #4dabf7;
      --accent-dim:  #3a8fd4;
      --accent-glow: rgba(77, 171, 247, 0.15);
      --text:        #eae8f5;
      --text-dim:    #7a7692;
      --text-faint:  #3e3b56;
      --danger:      #ff6b6b;
      --paper:       #f5f5f0;
      --sidebar-w:   220px;
      --toolbar-h:   48px;
      --pagebar-h:   44px;
    }

    /* ─── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ─── Layout ─────────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    /* ─── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .brand-icon { font-size: 18px; }
    .brand-name { font-size: 16px; font-weight: 700; }

    .notebook-section {
      flex: 1;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-faint);
      padding: 0 8px 8px;
    }
    .notebook-tab {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: 6px;
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      transition: background 0.15s, color 0.15s;
      text-align: left; width: 100%;
    }
    .notebook-tab:hover { background: var(--surface-2); color: var(--text); }
    .notebook-tab.active {
      background: var(--accent-glow); color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(77, 171, 247, 0.2);
    }
    .nb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nb-delete {
      font-size: 16px; color: var(--text-faint); padding: 0 2px;
      opacity: 0; transition: opacity 0.15s;
    }
    .notebook-tab:hover .nb-delete { opacity: 1; }
    .nb-delete:hover { color: var(--danger); }

    .nb-add-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 6px;
      color: var(--text-faint); font-size: 13px;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }
    .nb-add-btn:hover { background: var(--surface-2); color: var(--text); }

    .sidebar-footer {
      padding: 10px 8px 14px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .status-row {
      display: flex; align-items: center; gap: 8px; padding: 0 8px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-faint); transition: background 0.3s; flex-shrink: 0;
    }
    .status-dot.connected {
      background: #5fb98a;
      box-shadow: 0 0 5px rgba(95, 185, 138, 0.5);
    }
    .peer-label { font-size: 11px; color: var(--text-dim); }
    .footer-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-radius: 6px;
      color: var(--text-dim); font-size: 12px; font-weight: 500;
      transition: background 0.15s, color 0.15s; width: 100%;
    }
    .footer-btn:hover { background: var(--surface-2); color: var(--text); }
    .footer-btn svg { flex-shrink: 0; opacity: 0.7; }

    /* ─── Main ───────────────────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-rows: var(--toolbar-h) 1fr var(--pagebar-h);
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .toolbar-left, .toolbar-center, .toolbar-right {
      display: flex; align-items: center; gap: 6px;
    }
    .toolbar-center { flex: 1; justify-content: center; }
    #notebook-title {
      font-size: 14px; font-weight: 600; color: var(--text);
    }

    .tool-btn {
      width: 34px; height: 34px; border-radius: 6px;
      background: transparent; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .tool-btn:hover { background: var(--surface-2); color: var(--text); }
    .tool-btn.active { background: var(--accent-glow); color: var(--accent); }
    .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* Color palette */
    .color-palette { display: flex; gap: 4px; align-items: center; }
    .color-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-dot.active { border-color: var(--text); transform: scale(1.2); }

    /* Size palette */
    .size-palette { display: flex; gap: 3px; }
    .size-btn {
      padding: 3px 7px; border-radius: 4px;
      background: transparent; color: var(--text-dim);
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .size-btn.active { background: var(--accent-glow); color: var(--accent); }

    /* ─── Canvas Area ────────────────────────────────────────────────────── */
    #canvas-container {
      position: relative;
      overflow: hidden;
      background: var(--paper);
      cursor: crosshair;
    }
    #canvas-container canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* ─── Page Bar ───────────────────────────────────────────────────────── */
    .page-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 0 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .page-btn {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px;
      color: var(--text-dim); transition: background 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--surface-2); color: var(--text); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #page-indicator {
      font-size: 12px; color: var(--text-dim); min-width: 50px; text-align: center;
    }

    /* ─── Color Picker Popup ────────────────────────────────────────────── */
    .color-picker-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 12px; padding: 16px; z-index: 300;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .color-picker-popup.hidden { display: none; }
    .iro-confirm-btn {
      display: block; width: 100%; margin-top: 12px; padding: 8px;
      background: var(--accent-glow); border: 1px solid rgba(77,171,247,0.3);
      border-radius: 6px; color: var(--accent); font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .iro-confirm-btn:hover { background: rgba(77,171,247,0.25); }
    .color-picker-btn {
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red) !important;
      border: 2px solid var(--border) !important;
    }

    /* ─── Zen Mode ───────────────────────────────────────────────────────── */
    body.zen-mode .sidebar { display: none; }
    body.zen-mode .toolbar { display: none; }
    body.zen-mode .page-bar { display: none; }
    body.zen-mode .app { grid-template-columns: 1fr; }
    body.zen-mode .main { grid-template-rows: 1fr; }

    /* ─── Rename Input ───────────────────────────────────────────────────── */
    .rename-input {
      background: transparent; border: none; border-bottom: 1px solid var(--accent);
      color: var(--text); font-size: 14px; font-weight: 600;
      outline: none; padding: 2px 4px; width: 200px;
      font-family: inherit;
    }

    /* ─── Hand-Tool Cursor ──────────────────────────────────────────────── */
    #canvas-container.hand-cursor { cursor: grab; }
    #canvas-container.hand-cursor:active { cursor: grabbing; }

    /* ─── Sidebar Overlay (mobil) ────────────────────────────────────────── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 49;
    }
    .sidebar-overlay.active { display: block; }

    /* ─── Burger Button ──────────────────────────────────────────────────── */
    .burger-btn { display: none; }

    /* ─── Share Modal ────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,9,18,0.8); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 12px; width: 380px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 15px; font-weight: 700; }
    .modal-close {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px;
      color: var(--text-dim); transition: background 0.15s;
    }
    .modal-close:hover { background: var(--surface-2); color: var(--text); }
    .modal-body {
      padding: 18px; display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .qr-wrap {
      background: var(--paper); border-radius: 8px; padding: 10px; line-height: 0;
    }
    .qr-wrap canvas { display: block; border-radius: 4px; }
    .modal-hint {
      font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.6;
    }
    .link-row { display: flex; gap: 8px; width: 100%; }
    .link-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-dim); font-size: 11px;
      padding: 8px 10px; outline: none; min-width: 0; font-family: monospace;
    }
    .copy-btn {
      padding: 8px 14px; background: var(--accent-glow);
      border: 1px solid rgba(77,171,247,0.3); border-radius: 6px;
      color: var(--accent); font-size: 13px; font-weight: 600;
      transition: background 0.15s; flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(77,171,247,0.25); }

    /* ─── Responsive: Sidebar auf mobil verstecken ───────────────────────── */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        display: flex; position: fixed; left: 0; top: 0; bottom: 0;
        width: var(--sidebar-w); z-index: 50;
        transform: translateX(-100%); transition: transform 0.25s ease;
      }
      .sidebar.sidebar-open { transform: translateX(0); }
      .burger-btn { display: flex; }
    }

    /* ─── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">📒</span>
        <span class="brand-name">Notizbuch</span>
      </div>

      <div class="notebook-section">
        <div class="section-label">Notizbücher</div>
        <div id="notebook-list">
          <!-- Dynamisch via renderUI() -->
        </div>
        <button class="nb-add-btn" id="btn-add-notebook">+ Neues Notizbuch</button>
        <button class="nb-add-btn" id="btn-add-testbook" style="opacity:0.4; font-size:11px">🧪 Testbuch</button>
      </div>

      <div class="sidebar-footer">
        <div class="status-row">
          <span class="status-dot" id="status-dot"></span>
          <span class="peer-label" id="peer-count"></span>
        </div>
        <button class="footer-btn" id="btn-share" title="Notebook teilen">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Teilen
        </button>
        <button class="footer-btn" id="btn-export" title="Export">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </aside>

    <!-- ── Main ────────────────────────────────────────────────────────── -->
    <main class="main">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <!-- Burger (mobil) -->
          <button class="tool-btn burger-btn" id="btn-burger" title="Menü">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <!-- Pen -->
          <button class="tool-btn" data-tool="pen" title="Stift">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
          </button>
          <!-- Eraser -->
          <button class="tool-btn" data-tool="eraser" title="Radierer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/><path d="M6.5 13.5L12 8"/></svg>
          </button>
          <span class="divider"></span>
          <!-- Undo -->
          <button class="tool-btn" id="btn-undo" title="Rückgängig">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <!-- Clear -->
          <button class="tool-btn" id="btn-clear" title="Seite leeren" style="color: var(--danger)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
          <span class="divider"></span>
          <!-- Hand (Pan/Zoom) -->
          <button class="tool-btn" data-tool="hand" title="Verschieben/Zoom">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v1M14 10V4a2 2 0 0 0-4 0v6M10 10.5V5a2 2 0 0 0-4 0v9"/><path d="M18 11a2 2 0 0 1 4 0v5a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 17"/></svg>
          </button>
          <!-- View Reset -->
          <button class="tool-btn" id="btn-reset-view" title="Ansicht zurücksetzen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </button>
          <!-- Zen Mode -->
          <button class="tool-btn" id="btn-zen" title="Zen-Modus (Vollbild)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>

        <div class="toolbar-center">
          <span id="notebook-title"></span>
        </div>

        <div class="toolbar-right">
          <div class="color-palette" id="color-palette">
            <!-- Dynamisch via renderUI() -->
          </div>
          <span class="divider"></span>
          <div class="size-palette" id="size-palette">
            <!-- Dynamisch via renderUI() -->
          </div>
        </div>
      </div>

      <!-- Canvas -->
      <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="static-canvas"></canvas>
        <canvas id="active-canvas"></canvas>
      </div>

      <!-- Page Bar -->
      <div class="page-bar">
        <button class="page-btn" id="btn-prev" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="page-indicator">1 / 1</span>
        <button class="page-btn" id="btn-next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

    </main>
  </div>

  <!-- Sidebar Overlay (mobil) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Color Picker Popup -->
  <div class="color-picker-popup hidden" id="color-picker-popup">
    <div id="iro-container"></div>
    <button class="iro-confirm-btn" id="iro-confirm">Farbe übernehmen</button>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay hidden" id="share-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Notebook teilen</h2>
        <button class="modal-close" id="btn-close-share">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="qr-wrap" id="qr-container"></div>
        <p class="modal-hint">Scanne den QR-Code oder kopiere den Link.<br>Gleicher Link = gleiches Notizbuch.</p>
        <div class="link-row">
          <input class="link-input" type="text" id="share-link" readonly>
          <button class="copy-btn" id="btn-copy-link">Kopieren</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
